<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        /*
        SELETORES PERSONALIZADOS 
         # = id
         . = class
         : = pseudo-class
         :: = pseudo-element
         > = children
        */
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color: darkred;
        }

        a:hover{
            color: black;
            text-decoration: underline;
        }

        a:active{
            color: yellow;
        }
        .especial{
            background-color: rgba(149, 72, 72, 0.466);
        }
        .especial::before{
            content: '&rArr;';
        }

        .especial::after{
            content:'&lArr;' ;
            text-decoration: none;
            font-weight: normal;
            color: darkgray;
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositório GitHub</a></li>
        <li><a href="https://youtube.com/Cursoemvideo/" class="especial">Canal do Youtube</a></li>
        <li><a href="https://www.Cursoemvideo.com" class="especial">Site do Cursoemvideo</a></li>
    </ul>
    
</body>
</html>
